spring:
  application:
    name: meinian-api
  servlet:
    multipart:
      # 允许文件上传
      enabled: true
      # 每个文件最大不能超过15MB
      max-file-size: 15MB
      # HTTP请求不能超过20MB
      max-request-size: 20MB # Spring MVC中的配置，属于二道防线。
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.5.3:3320/meinian-his?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
    username: root
    password: 123456
    hikari:
      # HikariCP不需要指定连接池初始大小，它会自动维护。
      # 最小空闲连接数
      minimum-idle: 8
      # 最大连接数
      maximum-pool-size: 16
      # 连接超时时间（毫秒）
      connection-timeout: 60000
      # 连接测试查询
      connection-test-query: SELECT 1
  data:
    mongodb:
      uri: mongodb://admin:123456@192.168.5.3:27017/meinian-his?authSource=admin
    redis:
      database: 0
      host: localhost
      port: 6379
      password: 123456
      jedis:
        pool:
          #连接超时的最大时间
          max-active: 1000
          #等待空闲连接的最大等待时间（负数代表一直等待）
          max-wait: -1ms
          max-idle: 16
          min-idle: 8
server:
  port: 8080
  servlet:
    context-path: /meinian-api

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.yuqin.meinian.api.db.pojo
  configuration:
    #输出执行的SQL语句
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    #SpringBoot日志级别
    root: info
    #MyBatis的日志级别
    com.yuqin.meinian.api.db.mapper: warn
  pattern:
    console: "%d{yyyy/MM/dd HH:mm:ss}  %-5level  %msg%n"